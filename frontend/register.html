<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServeSmart Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">ServeSmart</span>
      <span class="brand-sub">Create your kitchen profile</span>
    </div>
    <nav class="nav">
      <a class="nav-link" href="index.html">Explore</a>
      <a class="nav-link" href="favorites.html">Favorites</a>
      <a class="nav-link active" href="register.html">Register</a>
    </nav>
  </header>

  <main class="page auth-page">
    <form class="auth-card" id="registerForm">
      <h1>Create account</h1>
      <p>Start saving recipes and scaling ingredients with confidence.</p>
      <label class="field">
        <span>Username</span>
        <input type="text" id="username" placeholder="Chef name" required>
      </label>
      <label class="field">
        <span>Email</span>
        <input type="email" id="email" placeholder="you@example.com" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="password" placeholder="Create a password" required>
      </label>
      <button class="primary" type="submit">Register</button>
      <p class="muted">Already have an account? <a href="login.html">Sign in</a></p>
    </form>
  </main>

  <script src="auth.js"></script>
</body>
</html>
